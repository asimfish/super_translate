name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Noto CJK fonts (translation rendering)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check app pdf_zh_translator tests

      - name: Terminology corpus lint
        run: python -m pdf_zh_translator corpus-lint --strict

      - name: Tests
        run: python -m pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t super-translate:ci .

      - name: Smoke test container
        run: |
          docker run -d --rm --name st -p 8000:8000 super-translate:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          echo "health check never came up"
          docker logs st
          exit 1
